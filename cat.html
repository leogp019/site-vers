<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sneaker Store | Catálogo</title>
    <link rel="stylesheet" href="cat.css">
</head>
<body>
 
    <header>
        <h1>lojinha da glaucia</h1>
        <p>Só os RP brava do momento</p>
    </header>
 
    <main class="container">
        <div class="card">
            <img src="air.jpg" alt="Tênis Nike">
            <div class="info">
                <h3>Nike Air Max</h3>
                <p class="preco">R$ 599,90</p>
                <button class="btn-comprar">Comprar Agora</button>
            </div>
        </div>
 
        <div class="card">
            <img src="ultra.webp" alt="Tênis Adidas">
            <div class="info">
                <h3>Adidas Ultraboost</h3>
                <p class="preco">R$ 749,00</p>
                <button class="btn-comprar">Comprar Agora</button>
            </div>
        </div>
        <div class="card">
            <img src="rs x.jpg" alt="Tênis Puma">
            <div class="info">
                <h3>Puma RS-X</h3>
                <p class="preco">R$ 450,00</p>
                <button class="btn-comprar"> Comprar Agora</button>
            </div>
        </div>
    </main>
</body>
</html>
