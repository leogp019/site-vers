<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sneaker Store | Catálogo</title>
    <link rel="stylesheet" href="cat2.css">
</head>
<body>
 
    <header>
        <h1>lojinha da glaucia</h1>
        <p>Só os RP brava do momento</p>
    </header>
 
    <main class="container">
        <div class="card">
            <img src="camisa_barcelona.webp" alt="Camisa Barça"> 
            <div class="info">
                <h3> Camisa Barcelona Away 2024/25 - Preta</h3>
                <p class="preco">R$ 199,90 </p>
                <button class="btn-comprar">Comprar Agora</button>
            </div>
        </div>
 
        <div class="card">
            <img src="real madrid.webp" alt="Camisa Real">
            <div class="info">
                <h3>Camisa Real Madrid Third 23/24 s/n° Torcedor Adidas Masculina</h3>
                <p class="preco">R$ 129,99</p>
                <button class="btn-comprar">Comprar Agora</button>
            </div>
        </div>
        <div class="card">
            <img src="shopping (1).webp" alt="Camisa Milan">
            <div class="info">
                <h3>Camisa Ac Milan Puma Torcedor Masculina Home 25/26</h3>
                <p class="preco">R$ 386,91</p>
                <button class="btn-comprar"> Comprar Agora</button>
            </div>
        </div>
    </main>
</body>
</html>
