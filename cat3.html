<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sneaker Store | Catálogo</title>
    <link rel="stylesheet" href="cat3.css">
</head>
<body>
 
    <header>
        <h1>lojinha da glaucia</h1>
        <p>Só os RP brava do momento</p>
    </header>
 
    <main class="container">
        <div class="card">
            <img src="design-sem-nome-.webp" alt="Calça Sarja">
            <div class="info">
                <h3>Calça Chino Sarja</h3>
                <p class="preco">R$ 249,90</p>
                <button class="btn-comprar">Comprar Agora</button>
            </div>
        </div>
 
        <div class="card">
            <img src="STRETCH-MARINHO.webp" alt="Calça Marinho">
            <div class="info">
                <h3>Calça Chino Work Sarja Stretch Marinho</h3>
                <p class="preco">R$ 619,90</p>
                <button class="btn-comprar">Comprar Agora</button>
            </div>
        </div>
        <div class="card">
            <img src="CHI-ALG-STONE.webp" alt="Calça Cinza">
            <div class="info">
                <h3>Calça Chino Estonada Cinza</h3>
                <p class="preco">R$ 249,90</p>
                <button class="btn-comprar"> Comprar Agora</button>
            </div>
        </div>
    </main>
</body>
</html>
